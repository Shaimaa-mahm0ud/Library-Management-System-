<header class="navbar" *ngIf="showNavbar">

  <!-- Logo -->
  <div class="logo" routerLink="/book">
    <div class="logo-icon">📚</div>
    <h2>Librarium</h2>
  </div>

  <!-- Links -->
  <nav>
    <a routerLink="/book" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
    <a routerLink="/my-books" routerLinkActive="active">My Books</a>
    <a *ngIf="userRole === 'admin'" routerLink="/admin/books" routerLinkActive="active">Admin</a>
    <a routerLink="/profile" routerLinkActive="active">Profile</a>
  </nav>

  <!-- Mobile Hamburger Menu Button -->
  <button class="menu-btn" (click)="toggleMenu(); $event.stopPropagation()">☰</button>

  <!-- Right Actions -->
  <div class="actions">

    <!-- Dark Mode Toggle -->
    <button (click)="toggleDarkMode(); $event.stopPropagation()">
      {{ darkMode ? '☀️' : '🌙' }}
    </button>

    <!-- Profile Dropdown -->
    <div class="profile dropdown">
      <div class="profile-box" (click)="toggleProfile(); $event.stopPropagation()">
        <div class="header-avatar-initial">
          {{ getInitials(userName) }}
        </div>
        <span>{{ userName }}</span>
      </div>

      <div class="menu profile-menu" *ngIf="showProfile">
        <p (click)="goToProfile()">👤 Profile</p>
        <hr>
        <p class="logout" (click)="logout()">🚪 Logout</p>
      </div>
    </div>

  </div>

</header>

<!-- Mobile Menu Dropdown -->
<div class="mobile-menu" *ngIf="showNavbar && mobileMenu" (click)="$event.stopPropagation()">
  <a routerLink="/book" (click)="closeMenus()">Home</a>
  <a routerLink="/my-books" (click)="closeMenus()">My Books</a>
  <a *ngIf="userRole === 'admin'" routerLink="/admin" (click)="closeMenus()">Admin</a>
  <a routerLink="/profile" (click)="closeMenus()">Profile</a>
  <hr>
  <a (click)="logout()" class="logout-text">Logout</a>
</div>
