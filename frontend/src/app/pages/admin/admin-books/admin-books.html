<app-admin-navbar></app-admin-navbar>
<div class="container py-5">

  <div class="page-header">
    <div>
      <h2>📚 Books Management</h2>
      <p>Manage all library books</p>
    </div>

    <button class="btn add-btn" (click)="addBook()">
      + Add Book
    </button>
  </div>

  <div class="table-card">

    <table class="table align-middle mb-0">

      <thead>
        <tr>
          <th>Book</th>
          <th>Author</th>
          <th>Price</th>
          <th>Category</th>
          <th>Total Copies</th>
          <th>Available Copies</th>
          <th>Rating</th>
          <th width="220">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let book of mybooks">
          <td>
            <div class="book-info">
              <img
                [src]="book.image"
                [alt]="book.title"
                class="book-img rounded-circle"
                (error)="book.image='assets/images/book-placeholder.png'">
              <span>{{ book.title }}</span>
            </div>
          </td>
          <td>{{ book.author }}</td>
          <td>{{ book.price }} EGP</td>
          <td>{{ book.category }}</td>
          <td>{{ book.totalCopies }}</td>
          <td>{{ book.availableCopies }}</td>
          <td>{{ book.rating }}</td>
          <td>
            <button
              class="btn btn-outline"
              (click)="edit(book._id!)">
              Edit
            </button>
            <button
              class="btn btn-danger"
              (click)="delete(book._id!)">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<nav class="mt-4 d-flex justify-content-center">
  <ul class="pagination custom-pagination">

    <li class="page-item" [class.disabled]="currentPage === 1">
      <button class="page-link" (click)="changePage(currentPage-1)">
        &laquo;
      </button>
    </li>

    <li
      class="page-item"
      *ngFor="let page of [].constructor(totalPages); let i = index"
      [class.active]="currentPage === i + 1">

      <button class="page-link" (click)="changePage(i + 1)">
        {{ i + 1 }}
      </button>

    </li>

    <li class="page-item" [class.disabled]="currentPage === totalPages">
      <button class="page-link" (click)="changePage(currentPage+1)">
        &raquo;
      </button>
    </li>

  </ul>
</nav>
