<div class="book-card">

  <div class="header">
    <h2>Add Book</h2>
  </div>

  <form [formGroup]="bookForm" (ngSubmit)="save()">

    <div class="form-group">
      <label>Title</label>
      <input class="form-control" formControlName="title">
    </div>

    <div class="form-group">
      <label>Author</label>
      <input class="form-control" formControlName="author">
    </div>

    <div class="form-group">
      <label>Description</label>
      <input class="form-control" formControlName="description">
    </div>

    <div class="form-group">
    <label>Image URL</label>
    <input type="text" class="form-control" formControlName="image">
  </div>

    <div class="form-group">
      <label>Price</label>
      <input type="number" class="form-control" formControlName="price">
    </div>

    <div class="form-group">
      <label>Category</label>
      <input class="form-control" formControlName="category">
    </div>

    <div class="form-group">
      <label>Total Copies</label>
      <input class="form-control" formControlName="totalCopies">
    </div>

    <div class="form-group">
      <label>Available Copies</label>
      <input class="form-control" formControlName="availableCopies">
    </div>

    <div class="form-group">
      <label>Rating</label>
      <input class="form-control" formControlName="rating">
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" formControlName="featured" id="featured">

      <label class="form-check-label" for="featured">
        Featured Book
      </label>
    </div>

    <div class="buttons">
      <button type="submit" class="btn btn-primary">
        Save
      </button>

      <button
        type="button"
        class="btn btn-secondary"
        (click)="cancel()">
        Cancel
      </button>
    </div>

  </form>

</div>
